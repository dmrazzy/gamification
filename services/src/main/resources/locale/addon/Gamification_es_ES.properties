gamification.defaultProgram.rule.pinActivityOnSpace.description=En un espacio que alojas, anclar actividades que crees que tus miembros necesitan ver cuando navegas por tu espacio comunitario

gamification.defaultProgram.rule.inviteUserToSpace.title=Invitar a gente a unirse a un espacio
gamification.defaultProgram.rule.inviteUserToSpace.description=Como anfitrión del espacio, invita a la gente a unirse a su comunidad dependiendo del tema y su pericia. Así, podrás hacer que tu comunidad se involucre y sea poderosa

gamification.defaultProgram.rule.becomeSpaceManager.title=Administrar tu propio espacio
gamification.defaultProgram.rule.becomeSpaceManager.description=Conviértete en un anfitrión y anima a tu comunidad a compartir conocimientos, a trabajar en equipo, a participar en un proyecto

gamification.defaultProgram.rule.addUserProfileAvatar.title=Añadir un avatar de perfil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Establecer un avatar de perfil para que otros miembros puedan reconocerte fácilmente


gamification.defaultProgram.rule.addUserProfileBanner.title=Añadir un banner de perfil
gamification.defaultProgram.rule.addUserProfileBanner.description=Haz tu perfil más atractivo añadiendo un banner personalizado


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Preséntate
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Llena la sección "Acerca de mí" en tu perfil.<br>Es lo primero que otros verán cuando visiten tu perfil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Introduzca su información de contacto
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Desde su perfil, introduzca su información de contacto para que otros miembros puedan ponerse en contacto con usted si es necesario.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Comparte tu experiencia de perfil
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Cualquier experiencia laboral y cualquier otra experiencia puede ser útil para cualquiera.<br>Así que dile a tu comunidad lo que has hecho y cuáles son tus habilidades reconocidas

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Configura tus preferencias de notificaciones
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Accede a tu configuración de notificaciones desde tu centro de notificaciones.<br>Una vez allí, te recomendamos revisar las preferencias de notificaciones para que puedas configurarlas a tu conveniencia.

gamification.defaultProgram.rule.joinSpace.title=Únete a otras comunidades
gamification.defaultProgram.rule.joinSpace.description=Descubre otras comunidades uniéndote a ellas y empieza a contribuir allí

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar espacio personalizado
gamification.defaultProgram.rule.updateSpaceAvatar.description=Accede a la configuración del espacio y cambia el avatar de tu espacio

