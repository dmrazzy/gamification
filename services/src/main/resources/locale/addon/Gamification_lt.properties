gamification.defaultProgram.rule.sendRelationshipRequest.description=Puslapyje Žmonės paprašykite kitų prisijungti prie jūsų tinklo.<br>Todėl juos lengvai rasite ieškodami žmonių kataloge

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Tinklo ryšys
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Pasižymėkite savo įgūdžiais ir žiniomis.<br>Priverskite daugiau žmonių susisiekti su jumis

gamification.defaultProgram.rule.addSpace.title=Pradėkite savo bendruomenę
gamification.defaultProgram.rule.addSpace.description=Sukurkite erdvę, kurioje bus nagrinėjama tema arba kurioje bus jūsų bendruomenė

gamification.defaultProgram.rule.pinActivityOnSpace.title=Prisekite svarbius pranešimus
gamification.defaultProgram.rule.pinActivityOnSpace.description=Erdvėje, kurią priglobiate, prisegkite veiklą, kurią, jūsų manymu, turi matyti jūsų nariai naršydami jūsų bendruomenės erdvę

gamification.defaultProgram.rule.inviteUserToSpace.title=Pakvieskite žmones prisijungti prie erdvės
gamification.defaultProgram.rule.inviteUserToSpace.description=Pakvieskite žmones prisijungti prie erdvėsKaip erdvės šeimininkas pakvieskite žmones prisijungti prie jūsų bendruomenės, atsižvelgdami į temą ir jų žinias. Taigi galėsite paversti savo bendruomenę patrauklia ir galinga

gamification.defaultProgram.rule.becomeSpaceManager.title=Tvarkykite savo erdvę
gamification.defaultProgram.rule.becomeSpaceManager.description=Tapkite erdvės šeimininku ir paskatinkite savo bendruomenę dalytis žiniomis, dirbti komandoje, įsitraukti į projektą

gamification.defaultProgram.rule.addUserProfileAvatar.title=Pridėkite profilio avatarą
gamification.defaultProgram.rule.addUserProfileAvatar.description=Nustatykite profilio avatarą, kad kiti nariai galėtų lengvai jus atpažinti


gamification.defaultProgram.rule.addUserProfileBanner.title=Pridėkite profilio reklamjuostę
gamification.defaultProgram.rule.addUserProfileBanner.description=Padarykite savo profilį patrauklesnį pridėdami tinkintą reklamjuostę


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Prisistatykite
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Savo profilyje užpildykite skiltį „Apie mane“.<br>Tai pirmas dalykas, kurį kiti pamatys apsilankę jūsų profilyje.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Įveskite savo kontaktinę informaciją
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Savo profilyje įveskite savo kontaktinę informaciją, kad kiti nariai galėtų su jumis susisiekti, jei reikia.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Pasidalykite savo profilio patirtimi
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Bet kokia darbo patirtis ir bet kokia kita patirtis gali būti naudinga bet kam.<br>Taigi papasakokite savo bendruomenei, ką padarėte ir kokie yra jūsų pripažinti įgūdžiai

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Nustatykite pranešimų nuostatas
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Pasiekite pranešimų nustatymus iš pranešimų centro.<br>Kai ten apsilankysite, rekomenduojame peržiūrėti pranešimų nuostatas, kad galėtumėte jas nustatyti jums patogiu metu.

gamification.defaultProgram.rule.joinSpace.title=Prisijunkite prie kitų bendruomenių
gamification.defaultProgram.rule.joinSpace.description=Atraskite kitas bendruomenes, prisijungdami prie jų ir pradėkite ten prisidėti

gamification.defaultProgram.rule.updateSpaceAvatar.title=Pasirinktinis kosmoso avataras
gamification.defaultProgram.rule.updateSpaceAvatar.description=Pasiekite erdvės nustatymus ir pakeiskite savo erdvės avatarą

