gamification.defaultProgram.rule.becomeSpaceManager.description=Devenez administrateur d'un espace et encouragez votre communauté à partager ses connaissances, à travailler en équipe, à s'engager dans un projet

gamification.defaultProgram.rule.addUserProfileAvatar.title=Ajouter une photo de profil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Ajouter une photo de profil pour que les autres membres puissent facilement vous reconnaître


gamification.defaultProgram.rule.addUserProfileBanner.title=Ajouter une bannière de profil
gamification.defaultProgram.rule.addUserProfileBanner.description=Rendez votre profil plus attrayant en ajoutant une bannière personnalisée


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Présentez-vous
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Remplissez la section "À propos de moi" sur votre profil.<br>C'est la première chose que les autres verront quand ils visiteront votre profil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Compléter vos informations
gamification.defaultProgram.rule.addUserProfileContactInformation.description=À partir de votre profil, entrez vos informations de contact afin que d'autres membres puissent vous contacter si nécessaire.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Partagez vos expériences professionnelles
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Toute expérience professionnelle ou bénévole est utile.<br>Ainsi, dites aux autres membres de la communauté ce que vous savez et ce que vous avez fait.

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Définissez vos préférences de notifications
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Accédez à vos paramètres depuis le centre de notifications.<br>Une fois la page affichée, revoyez vos préférences de notifications pour les adapter à votre usage.

gamification.defaultProgram.rule.joinSpace.title=Rejoignez d'autres communautés
gamification.defaultProgram.rule.joinSpace.description=Découvrez d'autres communautés en les rejoignant et commencez à y contribuer

gamification.defaultProgram.rule.updateSpaceAvatar.title=Personnalisez le logo de votre espace
gamification.defaultProgram.rule.updateSpaceAvatar.description=Accédez aux paramètres de l'espace et modifiez l'avatar de votre espace

