gamification.defaultProgram.gettingStarted.title=はじめに
gamification.defaultProgram.gettingStarted.description.firstInstruction=Meeds をキーステップで使い始める
gamification.defaultProgram.gettingStarted.description.secondInstruction=Meeds Engagement Platformに自信を持ってください
gamification.defaultProgram.CommunityEmpowerment.title=コミュニティのエンパワーメント
gamification.defaultProgram.CommunityEmpowerment.description.firstInstruction=コミュニティビルに参加しましょう！
gamification.defaultProgram.CommunityEmpowerment.description.secondInstruction=他のメンバーを祝福してプラットフォームでアクティブにする
gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=あなた自身のスペースを作成し、コミュニティが知識を共有できるようにしましょう。
gamification.defaultProgram.label.seeDocumentation=必要に応じて、 <a href="$DOCUMENTATION" style="text-decoration: none; color: #2F5E92; font-weight: bold;">ドキュメント</a> を参照してください。

gamification.defaultProgram.rule.sendRelationshipRequest.title=ネットワークリクエスト
gamification.defaultProgram.rule.sendRelationshipRequest.description=Peopleページから、他の人にあなたのネットワークへの参加をリクエストします。<br>したがって、peopleディレクトリで検索するときに簡単に見つけることができます。

gamification.defaultProgram.rule.receiveRelationshipRequest.title=ネットワーク接続
gamification.defaultProgram.rule.receiveRelationshipRequest.description=自分のスキルや専門知識を知ってもらおう。<br>より多くの人々があなたとつながるようになる。

gamification.defaultProgram.rule.addSpace.title=自分のコミュニティを始めましょう
gamification.defaultProgram.rule.addSpace.description=トピックを扱うことを目的としたスペースを作成するか、自分のコミュニティをホストします

gamification.defaultProgram.rule.pinActivityOnSpace.title=重要なメッセージをピン留めする
gamification.defaultProgram.rule.pinActivityOnSpace.description=あなたがホストするスペースでは、あなたのコミュニティスペースを閲覧するときにメンバーが見る必要があると思うアクティビティをピン留めします

gamification.defaultProgram.rule.inviteUserToSpace.title=人々をスペースに招待する
gamification.defaultProgram.rule.inviteUserToSpace.description=スペースホストとして、トピックとその専門知識に応じてコミュニティに参加する人を招待します。 したがって、あなたはあなたのコミュニティが関与し、強力にすることができます。

gamification.defaultProgram.rule.becomeSpaceManager.title=自分のスペースを管理する
gamification.defaultProgram.rule.becomeSpaceManager.description=宇宙のホストになり、知識を共有し、チームワークに参加し、プロジェクトに取り組むようコミュニティに奨励してください

gamification.defaultProgram.rule.addUserProfileAvatar.title=プロフィールのアバターを追加
gamification.defaultProgram.rule.addUserProfileAvatar.description=他のメンバーがあなたを簡単に認識できるようにプロフィールのアバターを設定します


gamification.defaultProgram.rule.addUserProfileBanner.title=プロファイルのバナーを追加
gamification.defaultProgram.rule.addUserProfileBanner.description=カスタムバナーを追加して、あなたのプロフィールを魅力的にする


gamification.defaultProgram.rule.addUserProfileAboutMe.title=自己紹介する
gamification.defaultProgram.rule.addUserProfileAboutMe.description=プロフィールの「About me」セクションに記入してください。<br>プロフィールにアクセスすると、他のユーザーが最初に表示されます。

gamification.defaultProgram.rule.addUserProfileContactInformation.title=連絡先情報を入力してください
gamification.defaultProgram.rule.addUserProfileContactInformation.description=プロフィールから、必要に応じて他のメンバーが連絡できるように連絡先情報を入力します。


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=プロフィールの経験を共有
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=任意の仕事経験、およびその他の経験は、誰にでも有用であることができます。<br>あなたが何をしたのか、そしてあなたの認識されたスキルは何ですか？

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=通知設定を設定する
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=通知センターから通知設定にアクセスします。<br>ご都合の良い時に設定できるよう、通知設定を確認することをお勧めします。

gamification.defaultProgram.rule.joinSpace.title=他のコミュニティに参加する
gamification.defaultProgram.rule.joinSpace.description=それらに参加し、そこに貢献することによって他のコミュニティを発見してください

gamification.defaultProgram.rule.updateSpaceAvatar.title=カスタムスペースのアバター
gamification.defaultProgram.rule.updateSpaceAvatar.description=スペースの設定にアクセスし、スペースのアバターを変更する

