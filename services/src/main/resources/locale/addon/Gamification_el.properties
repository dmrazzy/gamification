badge.description.Influencer_Social=Ένα επηρεαζόμενο μέλος της κοινότητας που κατέχει ένα υψηλότερο από το μέσο επίπεδο δικτύωσης και αλληλεπιδράσεων
badge.description.Erudite_Knowledge=Μια αξιόπιστη πηγή γνώσης για πολλά θέματα, ένας ισχυρός συνεισφέρων στις βάσεις γνώσεων των κοινοτήτων
