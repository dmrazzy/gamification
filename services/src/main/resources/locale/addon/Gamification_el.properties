badge.description.Encyclopedia_Knowledge=Γνωρίζει σχεδόν όλα τα κοινά θνητά που θα χρειαζόταν. Μια αναφορά που έχει διαμορφώσει την κοινοτική γνώση μακροπρόθεσμα.
badge.description.Apprentice_Knowledge=Ράμπες μέχρι τις δεξιότητές της, ακόμα μαθαίνουν και μοιράζονται ό, τι έμαθε κατά μήκος του δρόμου
