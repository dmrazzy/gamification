badge.description.Legend_Social=Ένας εξαιρετικός κοινωνικός ερμηνευτής τόσο ισχυρός και δημοφιλής που είναι τώρα μέρος της ιστορίας και του λαϊκού πολιτισμού στις κοινότητες.
badge.description.Guru_Social=Ένας κοινωνικός δάσκαλος, ένας κορυφαίος επηρεαστής με ένα μεγάλο δίκτυο και πολλές αλληλεπιδράσεις με άλλους
