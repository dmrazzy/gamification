gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Akákoľvek pracovná skúsenosť a akákoľvek iná skúsenosť môže byť pre kohokoľvek užitočná.<br>Povedzte teda svojej komunite, čo ste urobili a aké sú vaše uznávané zručnosti

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Nastavte si predvoľby upozornení
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Pristupujte k nastaveniam upozornení z centra upozornení.<br>Keď tam budete, odporúčame vám skontrolovať predvoľby upozornení, aby ste si ich mohli podľa potreby nastaviť.

gamification.defaultProgram.rule.joinSpace.title=Pripojte sa k iným komunitám
