gamification.defaultProgram.rule.inviteUserToSpace.description=Ako správca priestoru pozvite ľudí, aby sa pripojili v závislosti od témy a ich odbornosti.

gamification.defaultProgram.rule.becomeSpaceManager.title=Spravujte svoj vlastný priestor
gamification.defaultProgram.rule.becomeSpaceManager.description=Staňte sa správcom priestoru a povzbudzujte svoju komunitu, aby zdieľala znalosti, spolupracovala alebo sa zapájala do projektov

gamification.defaultProgram.rule.addUserProfileAvatar.title=Pridajte profilový avatar
gamification.defaultProgram.rule.addUserProfileAvatar.description=Nastavte si profilový avatar, aby vás ostatní členovia mohli ľahko rozpoznať


gamification.defaultProgram.rule.addUserProfileBanner.title=Pridajte banner profilu
gamification.defaultProgram.rule.addUserProfileBanner.description=\ Urobte svoj profil príťažlivejším pridaním vlastného bannera


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Predstavte sa
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Vyplňte časť „O mne“ vo svojom profile.<br>Je to prvá vec, ktorú ostatní uvidia, keď navštívia váš profil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Zadajte svoje kontaktné informácie
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Vo svojom profile zadajte svoje kontaktné informácie, aby vás ostatní členovia mohli v prípade potreby kontaktovať.


