gamification.defaultProgram.rule.sendRelationshipRequest.title=Мережевий запит
gamification.defaultProgram.rule.sendRelationshipRequest.description=На сторінці «Люди» попросіть інших приєднатися до вашої мережі.<br>Отже, ви легко знайдете їх під час пошуку в каталозі людей

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Підключення до мережі
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Повідомте про себе своїми навичками та досвідом.<br>Заохочуйте більше людей спілкуватися з вами

gamification.defaultProgram.rule.addSpace.title=Розпочніть свою спільноту
gamification.defaultProgram.rule.addSpace.description=Створіть простір, який буде спрямований на вирішення теми, або розмістить вашу спільноту

gamification.defaultProgram.rule.pinActivityOnSpace.title=Закріпити важливі повідомлення
gamification.defaultProgram.rule.pinActivityOnSpace.description=У просторі, яку ви зберігаєте, дизайнерські дії вважаєте, що ваші члени повинні побачити під час перегляду простору спільноти

gamification.defaultProgram.rule.inviteUserToSpace.title=Запросіть людей приєднатися до простору
gamification.defaultProgram.rule.inviteUserToSpace.description=Як космічний хост, запросіть людей приєднатися до вашої спільноти, залежно від теми та кваліфікованості. Таким чином, ви зможете зробити свою спільноту зайнятою та потужною

gamification.defaultProgram.rule.becomeSpaceManager.title=Керуйте вашим власним простором
gamification.defaultProgram.rule.becomeSpaceManager.description=Станьте космічним хостом і заохочуйте спільноті ділитися знаннями, командою, залучати їх у проект

gamification.defaultProgram.rule.addUserProfileAvatar.title=Додати аватар профілю
gamification.defaultProgram.rule.addUserProfileAvatar.description=Встановіть аватар профілю, щоб інші члени легко вас впізнали


gamification.defaultProgram.rule.addUserProfileBanner.title=Додати банер профілю
gamification.defaultProgram.rule.addUserProfileBanner.description=Зробіть ваш профіль більш привабливим, додавши власний банер


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Представте себе
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Заповніть розділ «Про мене» у своєму профілі.<br>Це перше, що побачать інші, коли відвідають ваш профіль.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Введіть контактну інформацію
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Уведіть вашу контактну інформацію, щоб інші учасники могли зв’язатися з вами, якщо це необхідно.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Поділіться своїм профілем досвіду
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Будь-який досвід роботи та будь-який інший досвід може бути корисним для будь-кого.<br>Тож розкажіть своїй спільноті, що ви зробили та які ваші визнані навички

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Встановіть параметри сповіщень
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Отримайте доступ до налаштувань сповіщень у своєму центрі сповіщень.<br>Ми рекомендуємо вам переглянути налаштування сповіщень, щоб налаштувати їх у зручний для вас час.

gamification.defaultProgram.rule.joinSpace.title=Приєднатися до інших спільнот
gamification.defaultProgram.rule.joinSpace.description=Відкрийте для себе інші спільноти, приєднавшись до них та почніть робити внесок тут

gamification.defaultProgram.rule.updateSpaceAvatar.title=Аватар користувача області
gamification.defaultProgram.rule.updateSpaceAvatar.description=Доступ до налаштувань простору та зміни аватару вашого простору

