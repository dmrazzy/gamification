gamification.defaultProgram.gettingStarted.description.secondInstruction=Будьте впевнені у платформі розв'язування м'яса
gamification.defaultProgram.CommunityEmpowerment.title=Об'єднання громад
gamification.defaultProgram.CommunityEmpowerment.description.firstInstruction=Візьміть участь у нашій спільноті по побудуванню!
