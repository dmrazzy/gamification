gamification.defaultProgram.gettingStarted.title=آغاز کار
gamification.defaultProgram.gettingStarted.description.firstInstruction=استفاده از پلتفرم خود را در چند مرحله شروع کنید
gamification.defaultProgram.gettingStarted.description.secondInstruction=با پلتفرم مطمئن شوید
gamification.defaultProgram.CommunityEmpowerment.title=توانمندسازی جامعه
gamification.defaultProgram.CommunityEmpowerment.description.firstInstruction=در ساختمان جامعه ما شرکت کنید!
gamification.defaultProgram.CommunityEmpowerment.description.secondInstruction=با تبریک به سایر اعضا در پلتفرم فعال باشید
gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=شروع به ایجاد فضای خود کنید و به جامعه کمک کنید تا دانش را به اشتراک بگذارد
gamification.defaultProgram.label.seeDocumentation=در صورت نیاز با سرپرست خود تماس بگیرید

gamification.defaultProgram.rule.sendRelationshipRequest.title=درخواست شبکه
gamification.defaultProgram.rule.sendRelationshipRequest.description=از صفحه افراد، از دیگران درخواست کنید که به شبکه شما بپیوندند.<br>بنابراین، هنگام جستجو در فهرست افراد، آنها را به راحتی پیدا خواهید کرد.

gamification.defaultProgram.rule.receiveRelationshipRequest.title=اتصال شبکه
gamification.defaultProgram.rule.receiveRelationshipRequest.description=خودتان را به خاطر مهارت‌ها، تخصص‌تان بشناسید.<br>از افراد بیشتری بخواهید با شما ارتباط برقرار کنند

gamification.defaultProgram.rule.addSpace.title=انجمن خود را راه اندازی کنید
gamification.defaultProgram.rule.addSpace.description=فضایی ایجاد کنید که هدف آن پرداختن به یک موضوع خاص باشد یا جامعه شما را جمع کند

gamification.defaultProgram.rule.pinActivityOnSpace.title=پین کردن پیام های مهم
gamification.defaultProgram.rule.pinActivityOnSpace.description=در فضایی که مدیریت می‌کنید، فعالیت‌هایی را که فکر می‌کنید اعضایتان باید هنگام مرور فضای انجمنتان ببینند پین کنید

gamification.defaultProgram.rule.inviteUserToSpace.title=افراد را برای پیوستن به یک فضا دعوت کنید
gamification.defaultProgram.rule.inviteUserToSpace.description=به عنوان ادمین فضا، افراد را با توجه به موضوع و تخصصشان دعوت به عضویت کنید.

gamification.defaultProgram.rule.becomeSpaceManager.title=فضای خود را مدیریت کنید
gamification.defaultProgram.rule.becomeSpaceManager.description=یک مدیر فضا شوید و جامعه خود را تشویق کنید تا دانش را به اشتراک بگذارند، همکاری کنند یا در پروژه ها شرکت کنند

gamification.defaultProgram.rule.addUserProfileAvatar.title=یک آواتار نمایه اضافه کنید
gamification.defaultProgram.rule.addUserProfileAvatar.description=یک آواتار نمایه تنظیم کنید تا سایر اعضا بتوانند به راحتی شما را تشخیص دهند


gamification.defaultProgram.rule.addUserProfileBanner.title=یک بنر پروفایل اضافه کنید
gamification.defaultProgram.rule.addUserProfileBanner.description=با افزودن یک بنر سفارشی، نمایه خود را جذاب تر کنید


gamification.defaultProgram.rule.addUserProfileAboutMe.title=خودتان را معرفی کنید
gamification.defaultProgram.rule.addUserProfileAboutMe.description=بخش «درباره من» را در نمایه خود پر کنید.<br>این اولین چیزی است که دیگران هنگام بازدید از نمایه شما خواهند دید.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=اطلاعات تماس خود را وارد کنید
gamification.defaultProgram.rule.addUserProfileContactInformation.description=از نمایه خود، اطلاعات تماس خود را وارد کنید تا در صورت نیاز سایر اعضا بتوانند با شما تماس بگیرند.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=تجربه نمایه خود را به اشتراک بگذارید
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=هر تجربه کاری، و هر تجربه دیگری، می تواند برای هر کسی مفید باشد.<br>بنابراین به جامعه خود بگویید چه کارهایی انجام داده اید و چه مهارت های شناخته شده ای دارید.

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=تنظیمات برگزیده اعلان خود را تنظیم کنید
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=از مرکز اعلان‌های خود به تنظیمات اعلان‌های خود دسترسی پیدا کنید.<br>به شما توصیه می‌کنیم که تنظیمات برگزیده اعلان‌ها را مرور کنید تا بتوانید در صورت تمایل آنها را تنظیم کنید.

gamification.defaultProgram.rule.joinSpace.title=به جوامع دیگر بپیوندید
gamification.defaultProgram.rule.joinSpace.description=جوامع دیگر را با پیوستن به آنها کشف کنید و در آنجا مشارکت کنید

gamification.defaultProgram.rule.updateSpaceAvatar.title=آواتار فضایی سفارشی
gamification.defaultProgram.rule.updateSpaceAvatar.description=به تنظیمات فضا دسترسی پیدا کنید و آواتار فضای خود را تغییر دهید

