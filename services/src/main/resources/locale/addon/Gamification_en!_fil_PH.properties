gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=Simulan ang paglikha ng iyong sariling espasyo at tulungan ang komunidad na magbahagi ng kaalaman
gamification.defaultProgram.label.seeDocumentation=Makipag-ugnayan sa iyong administrator kung kinakailangan

gamification.defaultProgram.rule.sendRelationshipRequest.title=Kahilingan sa Network
gamification.defaultProgram.rule.sendRelationshipRequest.description=Mula sa pahina ng Mga Tao, humiling ng iba na sumali sa iyong network.<br>Kaya, madali mo silang mahahanap kapag naghahanap sa direktoryo ng mga tao

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Network Connection
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Ipakilala ang iyong sarili sa iyong mga kasanayan, sa iyong kadalubhasaan.<br>Himuin ang mas maraming tao na kumonekta sa iyo

gamification.defaultProgram.rule.addSpace.title=Magsimula ng iyong sariling komunidad
gamification.defaultProgram.rule.addSpace.description=Lumikha ng isang puwang na naglalayong harapin ang isang paksa, o na magho-host ng iyong sariling komunidad

gamification.defaultProgram.rule.pinActivityOnSpace.title=I-pin ang mahahalagang mensahe
gamification.defaultProgram.rule.pinActivityOnSpace.description=Sa isang space na hino-host mo, i-pin ang mga aktibidad na sa tingin mo ay kailangang makita ng iyong mga miyembro kapag nagba-browse sa iyong community space

gamification.defaultProgram.rule.inviteUserToSpace.title=Mag-imbita ng mga tao na sumali sa isang space
gamification.defaultProgram.rule.inviteUserToSpace.description=Bilang isang space host, anyayahan ang mga tao na sumali sa iyong komunidad depende sa paksa at kanilang kadalubhasaan. Sa gayon, magagawa mong maging aktibo at makapangyarihan ang iyong komunidad

gamification.defaultProgram.rule.becomeSpaceManager.title=Pamahalaan ang iyong sariling espasyo
gamification.defaultProgram.rule.becomeSpaceManager.description=Maging isang space host at hikayatin ang iyong komunidad na magbahagi ng kaalaman, sa pagtutulungan ng magkakasama, upang makisali sa isang proyekto

gamification.defaultProgram.rule.addUserProfileAvatar.title=Magdagdag ng avatar ng profile
gamification.defaultProgram.rule.addUserProfileAvatar.description=Magtakda ng profile avatar para madaling makilala ka ng ibang mga miyembro


gamification.defaultProgram.rule.addUserProfileBanner.title=Magdagdag ng banner ng profile
gamification.defaultProgram.rule.addUserProfileBanner.description=Gawing mas kaakit-akit ang iyong profile sa pamamagitan ng pagdaragdag ng custom na banner


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Introduce yourself
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Punan ang seksyong "Tungkol sa akin" sa iyong profile.<br>Ito ang unang makikita ng iba kapag binisita nila ang iyong profile.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Ilagay ang iyong impormasyon sa pakikipag-ugnayan
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Mula sa iyong profile, ilagay ang iyong impormasyon sa pakikipag-ugnayan, para makontak ka ng ibang mga miyembro kung kinakailangan.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Ibahagi ang iyong Karanasan sa Profile
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Anumang karanasan sa trabaho, at anumang iba pang karanasan, ay maaaring maging kapaki-pakinabang para sa sinuman.<br>Kaya sabihin sa iyong komunidad kung ano ang nagawa mo at kung ano ang iyong mga kinikilalang kasanayan

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Itakda ang iyong mga kagustuhan sa notification
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=I-access ang iyong mga setting ng mga notification mula sa iyong notification center.<br>Sa sandaling naroon, inirerekomenda naming suriin mo ang mga kagustuhan sa mga notification upang maitakda mo ang mga ito sa iyong kaginhawahan.

gamification.defaultProgram.rule.joinSpace.title=Sumali sa ibang mga komunidad
gamification.defaultProgram.rule.joinSpace.description=Tuklasin ang iba pang mga komunidad sa pamamagitan ng pagsali sa kanila at magsimulang mag-ambag doon

gamification.defaultProgram.rule.updateSpaceAvatar.title=Custom na Space Avatar
gamification.defaultProgram.rule.updateSpaceAvatar.description=I-access ang mga setting ng espasyo at baguhin ang avatar ng iyong espasyo

