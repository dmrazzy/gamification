gamification.defaultProgram.rule.inviteUserToSpace.description=作為空間管理員，根據主題和專業知識邀請人們加入。

gamification.defaultProgram.rule.becomeSpaceManager.title=管理自己的空間
gamification.defaultProgram.rule.becomeSpaceManager.description=成為空間管理員並鼓勵您的社群分享知識、協作或參與專案

gamification.defaultProgram.rule.addUserProfileAvatar.title=新增個人資料頭像
gamification.defaultProgram.rule.addUserProfileAvatar.description=設定個人資料頭像，以便其他會員可以輕鬆認出您


gamification.defaultProgram.rule.addUserProfileBanner.title=新增個人資料橫幅
gamification.defaultProgram.rule.addUserProfileBanner.description=透過新增自訂橫幅讓您的個人資料更具吸引力


gamification.defaultProgram.rule.addUserProfileAboutMe.title=自我介紹一下
gamification.defaultProgram.rule.addUserProfileAboutMe.description=填写您个人资料中的“关于我”部分。<br>这是其他人访问您的个人资料时首先看到的内容。

gamification.defaultProgram.rule.addUserProfileContactInformation.title=輸入您的聯絡資訊
gamification.defaultProgram.rule.addUserProfileContactInformation.description=在您的個人資料中，輸入您的聯絡訊息，以便其他成員可以在需要時與您聯繫。


