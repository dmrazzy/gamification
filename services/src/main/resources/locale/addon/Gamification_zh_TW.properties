gamification.defaultProgram.rule.addUserProfileWorkExperience.description=任何工作经验和任何其他经验对任何人来说都是有用的。<br>因此，告诉你的社区你做了什么以及你公认的技能是什么。

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=設定您的通知首選項
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=从您的通知中心访问您的通知设置。<br>到达那里后，我们建议您查看通知首选项，以便您可以根据需要进行设置。

gamification.defaultProgram.rule.joinSpace.title=加入其他社區
gamification.defaultProgram.rule.joinSpace.description=加入其他社區並開始在那裡做出貢獻，發現其他社區

gamification.defaultProgram.rule.updateSpaceAvatar.title=自訂空間頭像
gamification.defaultProgram.rule.updateSpaceAvatar.description=訪問空間設定並更改空間頭像

