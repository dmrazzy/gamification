gamification.defaultProgram.rule.sendRelationshipRequest.description=מדף האנשים, בקש מאחרים להצטרף לרשת שלך.<br>לכן, תוכל למצוא אותם בקלות בעת חיפוש בספריית האנשים

gamification.defaultProgram.rule.receiveRelationshipRequest.title=חיבור לרשת
gamification.defaultProgram.rule.receiveRelationshipRequest.description=גלה את עצמך בזכות הכישורים שלך, המומחיות שלך.<br>קבל יותר אנשים להתחבר אליך

