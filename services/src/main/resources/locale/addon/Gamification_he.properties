gamification.defaultProgram.rule.addSpace.description=צור מרחב שמטרתו לעסוק בנושא, או שיארח את הקהילה שלך

gamification.defaultProgram.rule.pinActivityOnSpace.title=הצמד הודעות חשובות
gamification.defaultProgram.rule.pinActivityOnSpace.description=במרחב שאתה מארח, הצמד פעילויות שאתה חושב שהחברים שלך צריכים לראות בעת גלישה במרחב הקהילה שלך

gamification.defaultProgram.rule.inviteUserToSpace.title=הזמן אנשים להצטרף למרחב
gamification.defaultProgram.rule.inviteUserToSpace.description=כמארח חלל, הזמן אנשים להצטרף לקהילה שלך בהתאם לנושא ולמומחיות שלהם. כך, תוכל להפוך את הקהילה שלך למעורבת וחזקה

gamification.defaultProgram.rule.becomeSpaceManager.title=נהל את המרחב שלך
gamification.defaultProgram.rule.becomeSpaceManager.description=הפוך למארח שטח ועודד את הקהילה שלך לחלוק ידע, לעבודת צוות, להשתתף בפרויקט

gamification.defaultProgram.rule.addUserProfileAvatar.title=הוסף דמות של פרופיל
gamification.defaultProgram.rule.addUserProfileAvatar.description=הגדר אווטאר לפרופיל כך שחברים אחרים יוכלו לזהות אותך בקלות


gamification.defaultProgram.rule.addUserProfileBanner.title=הוסף באנר פרופיל
gamification.defaultProgram.rule.addUserProfileBanner.description=הפוך את הפרופיל שלך למושך יותר על ידי הוספת באנר מותאם אישית


gamification.defaultProgram.rule.addUserProfileAboutMe.title=תציג את עצמך
gamification.defaultProgram.rule.addUserProfileAboutMe.description=מלא את הקטע "אודותיי" בפרופיל שלך.<br>זה הדבר הראשון שאחרים יראו כשהם מבקרים בפרופיל שלך.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=הזן את פרטי הקשר שלך
gamification.defaultProgram.rule.addUserProfileContactInformation.description=מהפרופיל שלך, הזן את פרטי הקשר שלך, כדי שחברים אחרים יוכלו ליצור איתך קשר במידת הצורך.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=שתף את חווית הפרופיל שלך
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=כל ניסיון בעבודה וכל ניסיון אחר יכול להיות שימושי עבור כל אחד.<br>אז ספר לקהילה שלך מה עשית ומה הכישורים המוכרים שלך

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=הגדר את העדפות ההתראות שלך
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=גש להגדרות ההתראות שלך ממרכז ההתראות שלך.<br>אחרי שתגיע, אנו ממליצים לך לעיין בהעדפות ההתראות כדי שתוכל להגדיר אותן בזמן שנוח לך.

gamification.defaultProgram.rule.joinSpace.title=הצטרף לקהילות אחרות
gamification.defaultProgram.rule.joinSpace.description=גלה קהילות אחרות על ידי הצטרפות אליהן והתחל לתרום שם

