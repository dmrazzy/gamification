gamification.defaultProgram.gettingStarted.title=Приступая к работе
gamification.defaultProgram.gettingStarted.description.firstInstruction=Начать использование Meeds с помощью ключевых шагов
gamification.defaultProgram.gettingStarted.description.secondInstruction=Будьте уверены в платформе вовлечения в мидс
gamification.defaultProgram.CommunityEmpowerment.title=Расширение прав
gamification.defaultProgram.CommunityEmpowerment.description.firstInstruction=Участвуйте в строительстве сообщества!
gamification.defaultProgram.CommunityEmpowerment.description.secondInstruction=Будьте активны в платформе поздравив других пользователей
gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=Начните создавать свое собственное пространство и помогите сообществу делиться знаниями
gamification.defaultProgram.label.seeDocumentation=При необходимости обратитесь к администратору.

gamification.defaultProgram.rule.sendRelationshipRequest.title=Сетевой запрос
gamification.defaultProgram.rule.sendRelationshipRequest.description=На странице «Люди» попросите других присоединиться к вашей сети.<br>Таким образом, вы легко найдете их при поиске в каталоге людей.

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Сетевое подключение
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Заявите о себе благодаря своим навыкам и опыту.<br>Привлеките больше людей, чтобы связаться с вами

gamification.defaultProgram.rule.addSpace.title=Начните свое сообщество
gamification.defaultProgram.rule.addSpace.description=Создайте пространство, которое предназначено для работы с темой, или в котором будет приниматься ваше сообщество

gamification.defaultProgram.rule.pinActivityOnSpace.title=Закрепить важные сообщения
gamification.defaultProgram.rule.pinActivityOnSpace.description=В пространстве, которое вы являетесь хозяином, вы думаете, что ваши члены должны видеть при просмотре вашего сообщества

gamification.defaultProgram.rule.inviteUserToSpace.title=Пригласить людей в сообщество
gamification.defaultProgram.rule.inviteUserToSpace.description=Как носитель космоса, приглашайте людей присоединиться к вашему сообществу в зависимости от темы и их знаний. Таким образом, вы сможете сделать ваше сообщество вовлеченным и мощным

gamification.defaultProgram.rule.becomeSpaceManager.title=Управление собственным пространством
gamification.defaultProgram.rule.becomeSpaceManager.description=Станьте принимающей стороной космоса и поощряйте ваше сообщество к обмену знаниями, командной работе, к участию в проекте

gamification.defaultProgram.rule.addUserProfileAvatar.title=Добавить аватар профиля
gamification.defaultProgram.rule.addUserProfileAvatar.description=Установить аватар профиля, чтобы другие участники могли легко узнать вас


gamification.defaultProgram.rule.addUserProfileBanner.title=Добавить баннер профиля
gamification.defaultProgram.rule.addUserProfileBanner.description=Сделайте свой профиль более привлекательным, добавив пользовательский баннер


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Представь себя
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Заполните раздел «Обо мне» в своем профиле.<br>Это первое, что увидят другие, посетив ваш профиль.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Введите контактную информацию
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Введите свои контактные данные из профиля, чтобы другие члены могли связаться с вами при необходимости.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Поделитесь опытом своего профиля
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Любой рабочий опыт и любой другой опыт могут быть полезны каждому.<br>Так скажите своему сообществу что вы сделали и какие навыки вы узнали

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Настройки уведомлений
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Получите доступ к настройкам уведомлений из центра уведомлений.<br>После этого, мы рекомендуем вам просмотреть настройки уведомлений, чтобы вы могли установить их в удобном для вас месте.

gamification.defaultProgram.rule.joinSpace.title=Присоединиться к другим сообществам
gamification.defaultProgram.rule.joinSpace.description=Откройте для себя другие сообщества, присоединившись к ним и начните вносить свой вклад

gamification.defaultProgram.rule.updateSpaceAvatar.title=Пользовательский аватар области
gamification.defaultProgram.rule.updateSpaceAvatar.description=Доступ к настройкам пространства и изменение аватара вашего пространства

