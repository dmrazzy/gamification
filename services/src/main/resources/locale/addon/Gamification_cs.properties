gamification.defaultProgram.rule.receiveRelationshipRequest.description=Udělejte si vědět o svých dovednostech, své odborné znalosti.<br>Získejte více lidí, abyste se s vámi mohli spojit

gamification.defaultProgram.rule.addSpace.title=Založte si vlastní komunitu
gamification.defaultProgram.rule.addSpace.description=Vytvořte prostor, jehož cílem je vypořádat se s tématem, nebo který bude hostit vaši vlastní komunitu

