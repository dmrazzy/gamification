gamification.defaultProgram.rule.pinActivityOnSpace.description=V prostoru, který pořádáte, přihlaste aktivity, které si myslíte, že vaši členové potřebují vidět při procházení vašeho komunitního prostoru

gamification.defaultProgram.rule.inviteUserToSpace.title=Pozvěte lidi, aby se přidali do skupiny
gamification.defaultProgram.rule.inviteUserToSpace.description=Jako vesmírný hostitel pozvěte lidi, aby se připojili k vaší komunitě v závislosti na tématu a jejich odbornosti. Budete tak moci svou komunitu angažovat a posilovat

gamification.defaultProgram.rule.becomeSpaceManager.title=Spravujte si svůj vlastní prostor
gamification.defaultProgram.rule.becomeSpaceManager.description=Staňte se hostitelem vesmíru a povzbuďte vaši komunitu ke sdílení znalostí, k týmové práci, zapojte se do projektu

gamification.defaultProgram.rule.addUserProfileAvatar.title=Přidat profilový avatar
gamification.defaultProgram.rule.addUserProfileAvatar.description=Nastavte profilový avatar, aby vás ostatní členové mohli snadno rozpoznat


gamification.defaultProgram.rule.addUserProfileBanner.title=Přidat banner profilu
gamification.defaultProgram.rule.addUserProfileBanner.description=Udělejte svůj profil přitažlivější přidáním vlastního banneru


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Představte se
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Vyplňte do svého profilu sekci "O my".<br>Je to první věc, kterou uvidí ostatní při návštěvě vašeho profilu.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Zadejte kontaktní údaje
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Z vašeho profilu zadejte Vaše kontaktní údaje, aby vás ostatní členové mohli v případě potřeby kontaktovat.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Sdílet své zkušenosti s profilem
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Jakékoliv pracovní zkušenosti a jakékoli jiné zkušenosti mohou být užitečné pro každého.<br>Řekněte své komunitě, co jste udělali a jaké jsou vaše uznávané dovednosti

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Nastavte předvolby oznámení
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Přístup k nastavení oznámení z vašeho centra oznámení.<br>Jakmile tam budete chtít, doporučujeme zkontrolovat nastavení upozornění, abyste je mohli nastavit podle vlastního uvážení.

gamification.defaultProgram.rule.joinSpace.title=Připojit se k ostatním komunitám
gamification.defaultProgram.rule.joinSpace.description=Objevte ostatní komunity tím, že se k nim připojíte a začněte tam přispívat.

