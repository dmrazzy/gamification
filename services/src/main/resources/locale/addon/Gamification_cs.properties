gamification.defaultProgram.rule.sendRelationshipRequest.title=Síťový požadavek
gamification.defaultProgram.rule.sendRelationshipRequest.description=Na stránce Lidé, požádejte ostatní, aby se připojili k vaší síti.<br>Proto je při hledání v adresáři s lidmi snadno najdete

