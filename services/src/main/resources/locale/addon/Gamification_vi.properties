gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Bất kỳ kinh nghiệm làm việc nào và bất kỳ kinh nghiệm nào khác đều có thể hữu ích cho bất kỳ ai.<br>Vì vậy, hãy cho cộng đồng biết những gì bạn đã làm và những kỹ năng được công nhận của bạn

