gamification.defaultProgram.rule.receiveRelationshipRequest.description=Faça-se conhecido por suas habilidades, sua experiência.<br>Faça com que mais pessoas se conectem com você

gamification.defaultProgram.rule.addSpace.title=Iniciar sua própria comunidade
gamification.defaultProgram.rule.addSpace.description=Crie um espaço que tenha como objetivo lidar com um tópico, ou que hospede sua própria comunidade

gamification.defaultProgram.rule.pinActivityOnSpace.title=Fixar mensagens importantes
gamification.defaultProgram.rule.pinActivityOnSpace.description=Em um espaço em que você hospeda, as atividades de pin acham que seus membros precisam ver quando navegam no espaço da sua comunidade

gamification.defaultProgram.rule.inviteUserToSpace.title=Convide pessoas para ingressar em uma comunidade
gamification.defaultProgram.rule.inviteUserToSpace.description=Como anfitrião do espaço, convide pessoas para se juntarem à sua comunidade dependendo do tópico e de sua especialidade. Assim, você poderá tornar sua comunidade envolvida e poderosa

gamification.defaultProgram.rule.becomeSpaceManager.title=Gerencie seu próprio espaço
gamification.defaultProgram.rule.becomeSpaceManager.description=Torne-se um anfitrião espacial e incentive sua comunidade a compartilhar conhecimento, a trabalhar em equipe, para se envolver em um projeto

gamification.defaultProgram.rule.addUserProfileAvatar.title=Adicionar um avatar de perfil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Defina um avatar de perfil para que outros membros possam reconhecê-lo facilmente


gamification.defaultProgram.rule.addUserProfileBanner.title=Adicionar um banner de perfil
gamification.defaultProgram.rule.addUserProfileBanner.description=Faça seu perfil mais atraente adicionando um banner personalizado


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Apresente-se
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Preencha a seção "Sobre mim" no seu perfil.<br>é a primeira coisa que os outros verão quando visitarem seu perfil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Insira suas informações de contato
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Do seu perfil, insira suas informações de contato para que outros membros possam entrar em contato com você, se necessário.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Compartilhe sua experiência de perfil
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Qualquer experiência de trabalho e qualquer outra experiência pode ser útil para qualquer pessoa.<br>Então conte à sua comunidade o que você fez e quais são suas habilidades reconhecidas

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Defina suas preferências de notificações
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Acesse suas configurações de notificações na central de notificações.<br>Uma vez lá, recomendamos que você revise as preferências de notificações para que possa defini-las conforme sua conveniência.

gamification.defaultProgram.rule.joinSpace.title=Junte-se a outras comunidades
gamification.defaultProgram.rule.joinSpace.description=Descubra outras comunidades juntando-se a elas e comece a contribuir

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar do Espaço Personalizado
gamification.defaultProgram.rule.updateSpaceAvatar.description=Acesse as configurações do espaço e altere o avatar do seu espaço

