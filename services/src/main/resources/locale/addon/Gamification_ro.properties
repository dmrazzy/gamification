gamification.defaultProgram.rule.receiveRelationshipRequest.description=Fă-ți cunoscut pentru abilitățile tale, expertiza.<br>Obține mai mulți oameni pentru a te conecta cu tine

gamification.defaultProgram.rule.addSpace.title=Începe propria comunitate
gamification.defaultProgram.rule.addSpace.description=Creați un spațiu care vizează să se ocupe de un subiect sau care vă va găzdui propria comunitate

gamification.defaultProgram.rule.pinActivityOnSpace.title=Fixează mesaje importante
gamification.defaultProgram.rule.pinActivityOnSpace.description=Într-un spațiu pe care îl găzduiești, activități de fixare pentru membrii tăi trebuie să vadă când navighează în spațiul comunitar

gamification.defaultProgram.rule.inviteUserToSpace.title=Invită persoane să se alăture unui spațiu
gamification.defaultProgram.rule.inviteUserToSpace.description=În calitate de gazdă a spațiului, invită oameni să se alăture comunității tale în funcție de subiect și de expertiza lor. Astfel, veți putea să vă implicați și să vă faceți comunitatea puternică

gamification.defaultProgram.rule.becomeSpaceManager.title=Gestionează-ți propriul spațiu
gamification.defaultProgram.rule.becomeSpaceManager.description=Deveniți o gazdă spațială și încurajați-vă comunitatea să vă împărtășească cunoștințe, să lucrați în echipă, să vă angajați într-un proiect

gamification.defaultProgram.rule.addUserProfileAvatar.title=Adaugă un avatar de profil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Setaţi un avatar de profil astfel încât alţi membri să vă poată recunoaşte cu uşurinţă


gamification.defaultProgram.rule.addUserProfileBanner.title=Adaugă un banner de profil
gamification.defaultProgram.rule.addUserProfileBanner.description=Faceți profilul mai atrăgător prin adăugarea unui banner personalizat


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Introduce singur
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Completaţi secţiunea "Despre mine" din profilul dvs.<br>este primul lucru pe care alţii îl vor vedea când vă vizitează profilul.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Introduceți informațiile dvs. de contact
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Din profilul dvs., introduceți informațiile de contact, astfel încât alți membri să vă poată contacta, dacă este necesar.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Împărtășiți-vă experiența de profil
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Orice experienţă în muncă, precum şi orice altă experienţă pot fi utile oricui.<br>Aşa că spune-i comunităţii tale ce ai făcut şi care sunt abilităţile tale recunoscute

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Setați preferințele pentru notificări
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Accesează setările notificărilor din centrul tău de notificări.<br>O dată acolo, vă recomandăm să examinați preferințele pentru notificări, astfel încât să le puteți seta la conveniență.

gamification.defaultProgram.rule.joinSpace.title=Alătură-te altor comunități
gamification.defaultProgram.rule.joinSpace.description=Descoperă alte comunități prin alăturarea lor și începe să contribuie acolo

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar Spațiu personalizat
gamification.defaultProgram.rule.updateSpaceAvatar.description=Accesează setările spațiului și schimbă avatarul spațiului tău

