gamification.defaultProgram.rule.receiveRelationshipRequest.description=让自己了解自己的技能，您的专业知识，<br>获取更多的人与您联系

gamification.defaultProgram.rule.addSpace.title=开始您自己的社区
gamification.defaultProgram.rule.addSpace.description=创建一个旨在处理某个主题的空间，或将接纳你自己的社区

gamification.defaultProgram.rule.pinActivityOnSpace.title=置顶重要消息
gamification.defaultProgram.rule.pinActivityOnSpace.description=在你主持的空间中，你认为你的成员需要看到当浏览你的社区空间时的固定活动

gamification.defaultProgram.rule.inviteUserToSpace.title=邀请人加入一个空间
gamification.defaultProgram.rule.inviteUserToSpace.description=作为空间东道主，邀请人们加入你的社区，视主题和他们的专长而定。 因此，你将能够让你的社区参与进来并变得强大的

gamification.defaultProgram.rule.becomeSpaceManager.title=管理您自己的空间
gamification.defaultProgram.rule.becomeSpaceManager.description=成为空间主机，鼓励您的社区分享知识，参与团队工作，参与一个项目

gamification.defaultProgram.rule.addUserProfileAvatar.title=添加个人头像
gamification.defaultProgram.rule.addUserProfileAvatar.description=设置一个配置文件头像，以便其他成员能够轻松地识别你


gamification.defaultProgram.rule.addUserProfileBanner.title=添加素材素材
gamification.defaultProgram.rule.addUserProfileBanner.description=通过添加一个自定义横幅使您的个人资料更具有吸引力。


gamification.defaultProgram.rule.addUserProfileAboutMe.title=自我介绍
gamification.defaultProgram.rule.addUserProfileAboutMe.description=填写您个人资料中的“关于我的”部分。<br>是其他人访问您个人资料时最先看到的事情。

gamification.defaultProgram.rule.addUserProfileContactInformation.title=输入您的联系人信息
gamification.defaultProgram.rule.addUserProfileContactInformation.description=从您的个人资料中输入您的联系信息，以便其他成员在需要时可以联系您。


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=分享您的个人资料体验
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=任何工作经验和任何其他经验对任何人都是有用的。<br>因此告诉你的社区你做了什么和你的公认技能

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=设置您的通知首选项
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=从通知中心访问您的通知设置。<br>一旦存在，我们建议您审查通知首选项，以便您能够在您方便的时候设置通知。

gamification.defaultProgram.rule.joinSpace.title=加入其他社区
gamification.defaultProgram.rule.joinSpace.description=通过加入其他社区并开始在那里做出贡献

gamification.defaultProgram.rule.updateSpaceAvatar.title=自定义空间头像
gamification.defaultProgram.rule.updateSpaceAvatar.description=访问空间设置并更改您空间的头像

