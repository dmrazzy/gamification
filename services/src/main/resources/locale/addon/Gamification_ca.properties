gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=Comença a crear el teu propi espai i ajuda la comunitat a compartir coneixement
gamification.defaultProgram.label.seeDocumentation=Contacteu amb el vostre administrador si cal

gamification.defaultProgram.rule.sendRelationshipRequest.title=Sol·licitud de xarxa
gamification.defaultProgram.rule.sendRelationshipRequest.description=Des de la pàgina Persones, demaneu que altres persones s'uneixin a la vostra xarxa.<br>Per tant, els trobareu fàcilment quan cerqueu al directori de persones.

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Connexió a la xarxa
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Doneu-vos a conèixer per les vostres habilitats, la vostra experiència.<br>Aconseguiu que més persones es connectin amb vosaltres

gamification.defaultProgram.rule.addSpace.title=Comença la teva pròpia comunitat
gamification.defaultProgram.rule.addSpace.description=Crea un espai que pretengui tractar un tema concret, o que reunirà la teva comunitat

gamification.defaultProgram.rule.pinActivityOnSpace.title=Fixeu missatges importants
gamification.defaultProgram.rule.pinActivityOnSpace.description=En un espai que administreu, fixeu les activitats que creieu que els vostres membres han de veure quan navegueu pel vostre espai comunitari

gamification.defaultProgram.rule.inviteUserToSpace.title=Convida persones a unir-se a un espai
gamification.defaultProgram.rule.inviteUserToSpace.description=Com a administrador de l'espai, convideu persones a unir-se segons el tema i la seva experiència.

gamification.defaultProgram.rule.becomeSpaceManager.title=Gestiona el teu propi espai
gamification.defaultProgram.rule.becomeSpaceManager.description=Converteix-te en administrador de l'espai i anima la teva comunitat a compartir coneixements, col·laborar o participar en projectes

gamification.defaultProgram.rule.addUserProfileAvatar.title=Afegeix un avatar de perfil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Estableix un avatar de perfil perquè altres membres et puguin reconèixer fàcilment


gamification.defaultProgram.rule.addUserProfileBanner.title=Afegeix un bàner de perfil
gamification.defaultProgram.rule.addUserProfileBanner.description=Fes que el teu perfil sigui més atractiu afegint un bàner personalitzat


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Presenta't
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Omple la secció "Quant a mi" al teu perfil.<br>És el primer que veuran els altres quan visiten el teu perfil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Introduïu la vostra informació de contacte
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Des del vostre perfil, introduïu la vostra informació de contacte perquè altres membres puguin contactar-vos si cal.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Comparteix la teva experiència de perfil
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Qualsevol experiència laboral, i qualsevol altra experiència, pot ser útil per a qualsevol.<br>Així que digueu a la vostra comunitat què heu fet i quines són les vostres habilitats reconegudes.

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Estableix les teves preferències de notificació
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Accediu a la vostra configuració de notificacions des del vostre centre de notificacions.<br>Un cop allà, us recomanem que reviseu les preferències de notificacions perquè pugueu configurar-les segons us convingui.

gamification.defaultProgram.rule.joinSpace.title=Uneix-te a altres comunitats
gamification.defaultProgram.rule.joinSpace.description=Descobreix altres comunitats unint-te a elles i comença a contribuir-hi

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar d'espai personalitzat
gamification.defaultProgram.rule.updateSpaceAvatar.description=Accediu a la configuració de l'espai i canvieu l'avatar del vostre espai

