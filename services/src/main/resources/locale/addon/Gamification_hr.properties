gamification.defaultProgram.rule.sendRelationshipRequest.title=Mrežni zahtjev
gamification.defaultProgram.rule.sendRelationshipRequest.description=Sa stranice Osobe zatražite od drugih da se pridruže vašoj mreži.<br>Stoga ćete ih lako pronaći kada pretražujete u imeniku osoba

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Mrežna veza
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Pokažite se svojim vještinama, stručnošću.<br>Privucite više ljudi da se povežu s vama

gamification.defaultProgram.rule.addSpace.title=Pokrenite vlastitu zajednicu
gamification.defaultProgram.rule.addSpace.description=Stvorite prostor koji ima za cilj baviti se određenom temom ili koji će okupiti vašu zajednicu

gamification.defaultProgram.rule.pinActivityOnSpace.title=Prikvačite važne poruke
gamification.defaultProgram.rule.pinActivityOnSpace.description=U prostoru kojim upravljate prikvačite aktivnosti za koje mislite da bi vaši članovi trebali vidjeti dok pregledavaju prostor vaše zajednice

gamification.defaultProgram.rule.inviteUserToSpace.title=Pozovite ljude da se pridruže prostoru
gamification.defaultProgram.rule.inviteUserToSpace.description=Kao administrator prostora, pozovite ljude da se pridruže ovisno o temi i njihovoj stručnosti.

gamification.defaultProgram.rule.becomeSpaceManager.title=Upravljajte vlastitim prostorom
gamification.defaultProgram.rule.becomeSpaceManager.description=Postanite administrator prostora i potaknite svoju zajednicu na dijeljenje znanja, suradnju ili sudjelovanje u projektima

gamification.defaultProgram.rule.addUserProfileAvatar.title=Dodajte avatar profila
gamification.defaultProgram.rule.addUserProfileAvatar.description=Postavite avatar profila kako bi vas drugi članovi mogli lako prepoznati


gamification.defaultProgram.rule.addUserProfileBanner.title=Dodajte banner profila
gamification.defaultProgram.rule.addUserProfileBanner.description=Učinite svoj profil privlačnijim dodavanjem prilagođenog natpisa


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Predstavite se
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Ispunite odjeljak "O meni" na svom profilu.<br>To je prva stvar koju će drugi vidjeti kada posjete vaš profil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Unesite svoje podatke za kontakt
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Iz svog profila unesite svoje podatke za kontakt kako bi vas drugi članovi mogli kontaktirati ako je potrebno.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Podijelite svoje iskustvo s profilom
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Svako radno iskustvo, i bilo koje drugo iskustvo, može biti korisno za svakoga.<br>Zato recite svojoj zajednici što ste učinili i koje su vaše priznate vještine

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Postavite svoje postavke obavijesti
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Pristupite svojim postavkama obavijesti iz svog centra za obavijesti.<br>Kada ste tamo, preporučujemo da pregledate postavke obavijesti kako biste ih mogli postaviti kako vam odgovara.

gamification.defaultProgram.rule.joinSpace.title=Pridružite se drugim zajednicama
gamification.defaultProgram.rule.joinSpace.description=Otkrijte druge zajednice pridruživanjem im i počnite pridonositi tamo

gamification.defaultProgram.rule.updateSpaceAvatar.title=Prilagođeni svemirski avatar
gamification.defaultProgram.rule.updateSpaceAvatar.description=Pristupite postavkama prostora i promijenite avatar svog prostora

