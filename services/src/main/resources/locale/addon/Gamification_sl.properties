gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Dostopajte do nastavitev obvestil iz centra za obvestila.<br>Ko ste tam, vam priporočamo, da pregledate nastavitve obvestil, da jih lahko nastavite, kot vam ustreza.

