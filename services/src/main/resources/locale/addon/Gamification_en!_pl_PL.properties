gamification.defaultProgram.rule.sendRelationshipRequest.title=Żądanie sieci
gamification.defaultProgram.rule.sendRelationshipRequest.description=Na stronie Ludzie poproś innych o dołączenie do Twojej sieci.<br>Dzięki temu znajdziesz ich łatwo, przeszukując katalog osób.

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Połączenie sieciowe
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Daj się poznać jako osoba znana ze swoich umiejętności i wiedzy specjalistycznej.<br>Spraw, aby więcej osób nawiązało z Tobą kontakt.

gamification.defaultProgram.rule.addSpace.title=Rozpocznij swoją własną społeczność
gamification.defaultProgram.rule.addSpace.description=Stwórz przestrzeń, która ma na celu zajęcie się tematem lub która będzie gospodarzem Twojej własnej społeczności

gamification.defaultProgram.rule.pinActivityOnSpace.title=Przypnij ważne wiadomości
gamification.defaultProgram.rule.pinActivityOnSpace.description=W kosmosie, w którym prowadzisz, przypinaj aktywności, które uważasz, że Twoi użytkownicy muszą widzieć podczas przeglądania przestrzeni twojej społeczności

gamification.defaultProgram.rule.inviteUserToSpace.title=Zaproś ludzi do dołączenia do przestrzeni
gamification.defaultProgram.rule.inviteUserToSpace.description=Jako gospodarz przestrzeni kosmicznej zaprasza ludzi do przyłączenia się do Twojej społeczności w zależności od tematu i ich wiedzy specjalistycznej. Dzięki temu będziesz mógł sprawić, że twoja społeczność będzie zaangażowana i potężna

gamification.defaultProgram.rule.becomeSpaceManager.title=Zarządzaj własnymi miejscami
gamification.defaultProgram.rule.becomeSpaceManager.description=Zostań gospodarzem przestrzeni kosmicznej i zachęć swoją społeczność do dzielenia się wiedzą, do pracy zespołowej, do zaangażowania się w projekt

gamification.defaultProgram.rule.addUserProfileAvatar.title=Dodaj awatar profilu
gamification.defaultProgram.rule.addUserProfileAvatar.description=Ustaw awatar profilu, aby inni użytkownicy mogli łatwo Cię rozpoznać


gamification.defaultProgram.rule.addUserProfileBanner.title=Dodaj baner profilu
gamification.defaultProgram.rule.addUserProfileBanner.description=Uczyń swój profil bardziej atrakcyjnym poprzez dodanie niestandardowego banera


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Przedstaw się
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Wypełnij sekcję „O mnie” w swoim profilu.<br>To będzie pierwsza rzecz, którą zobaczą inni użytkownicy odwiedzający Twój profil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Wprowadź swoje dane kontaktowe
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Na podstawie profilu wprowadź swoje dane kontaktowe, aby inni użytkownicy mogli się z Tobą skontaktować.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Podziel się swoim profilem
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Każde doświadczenie zawodowe i wszelkie inne doświadczenia mogą być przydatne dla każdego.<br>Powiedz swojemu społeczności, co zrobiłeś i jakie są Twoje uznane umiejętności

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Ustaw swoje preferencje powiadomień
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Dostęp do ustawień powiadomień z centrum powiadomień.<br>Kiedy tam polecamy przejrzeć preferencje powiadomień, dzięki czemu możesz je ustawić w swojej wygodie.

gamification.defaultProgram.rule.joinSpace.title=Dołącz do innych społeczności
gamification.defaultProgram.rule.joinSpace.description=Odkryj inne społeczności, dołączając do nich i zaczynając się tam wnosić wkład

gamification.defaultProgram.rule.updateSpaceAvatar.title=Niestandardowy awatar spacji
gamification.defaultProgram.rule.updateSpaceAvatar.description=Uzyskaj dostęp do ustawień przestrzeni i zmień awatar przestrzeni

