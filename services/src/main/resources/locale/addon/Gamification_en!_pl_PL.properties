gamification.defaultProgram.CommunityEmpowerment.title=Wzmocnienie pozycji społeczności
gamification.defaultProgram.CommunityEmpowerment.description.firstInstruction=Weź udział w naszym budynku społeczności!
gamification.defaultProgram.CommunityEmpowerment.description.secondInstruction=Bądź aktywny na platformie gratulując innym członkom
gamification.defaultProgram.CommunityEmpowerment.description.thirdInstruction=Zacznij tworzyć własną przestrzeń i pomóż społeczności dzielić się wiedzą
