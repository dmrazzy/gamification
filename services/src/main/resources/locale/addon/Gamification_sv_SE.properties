gamification.defaultProgram.rule.receiveRelationshipRequest.title=Nätverksanslutning
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Känn dig själv känd för dina färdigheter, din expertis.<br>Få fler människor att komma i kontakt med dig

gamification.defaultProgram.rule.addSpace.title=Starta din egen gemenskap
gamification.defaultProgram.rule.addSpace.description=Skapa ett utrymme som syftar till att hantera ett ämne, eller som kommer att vara värd för din egen gemenskap

gamification.defaultProgram.rule.pinActivityOnSpace.title=Fäst viktiga meddelanden
gamification.defaultProgram.rule.pinActivityOnSpace.description=I ett utrymme som du är värd för, pin aktiviteter som du tror att dina medlemmar behöver se när du surfar din community utrymme

gamification.defaultProgram.rule.inviteUserToSpace.title=Bjud in personer att gå med i en lokal
gamification.defaultProgram.rule.inviteUserToSpace.description=Som rymdvärd kan du bjuda in människor att gå med i din gemenskap beroende på ämne och deras kompetens. Således kommer du att kunna göra din gemenskap engagerad och kraftfull

gamification.defaultProgram.rule.becomeSpaceManager.title=Hantera ditt eget utrymme
gamification.defaultProgram.rule.becomeSpaceManager.description=Bli en mötesvärd och uppmuntra din gemenskap att dela kunskap, till lagarbete, att engagera sig i ett projekt

gamification.defaultProgram.rule.addUserProfileAvatar.title=Lägg till en profilavatar
gamification.defaultProgram.rule.addUserProfileAvatar.description=Ange en profilavatar så att andra medlemmar enkelt kan känna igen dig


gamification.defaultProgram.rule.addUserProfileBanner.title=Lägg till en profilannons
gamification.defaultProgram.rule.addUserProfileBanner.description=Gör din profil mer tilltalande genom att lägga till en anpassad banner


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Introducera dig själv
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Fyll i avsnittet "Om mig" på din profil.<br>Det är det första andra kommer att se när de besöker din profil.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Ange dina kontaktuppgifter
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Från din profil anger du dina kontaktuppgifter så att andra medlemmar kan kontakta dig om det behövs.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Dela din profilupplevelse
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Alla arbetslivserfarenheter och andra erfarenheter kan vara användbara för vem som helst.<br>Så berätta för din gemenskap vad du har gjort och vilka är dina erkända färdigheter

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Ställ in dina aviseringsinställningar
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Få tillgång till dina aviseringsinställningar från ditt aviseringscenter.<br>Väl där, rekommenderar vi att du granskar inställningarna för aviseringar så att du kan ställa in dem när det passar dig.

gamification.defaultProgram.rule.joinSpace.title=Gå med i andra forum
gamification.defaultProgram.rule.joinSpace.description=Upptäck andra gemenskaper genom att gå med i dem och börja bidra där

gamification.defaultProgram.rule.updateSpaceAvatar.title=Anpassad webb-avatar
gamification.defaultProgram.rule.updateSpaceAvatar.description=Kom åt inställningarna för utrymmet och ändra avatar för ditt utrymme

