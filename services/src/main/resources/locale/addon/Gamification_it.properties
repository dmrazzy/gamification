gamification.defaultProgram.rule.addSpace.title=Inizia la tua comunità
gamification.defaultProgram.rule.addSpace.description=Crea uno spazio che mira ad affrontare un argomento, o che ospiterà la tua comunità

gamification.defaultProgram.rule.pinActivityOnSpace.title=Aggiungi messaggi importanti
gamification.defaultProgram.rule.pinActivityOnSpace.description=In uno spazio che host, pin attività pensi che i tuoi membri debbano vedere quando si naviga nello spazio della comunità

gamification.defaultProgram.rule.inviteUserToSpace.title=Invita le persone a entrare in uno spazio
gamification.defaultProgram.rule.inviteUserToSpace.description=Come ospite spaziale, invita le persone a unirsi alla tua comunità a seconda dell'argomento e della loro competenza. Così, sarete in grado di rendere la vostra comunità impegnata e potente

gamification.defaultProgram.rule.becomeSpaceManager.title=Gestisci il tuo spazio
gamification.defaultProgram.rule.becomeSpaceManager.description=Diventa un host spaziale e incoraggia la tua comunità a condividere conoscenze, a lavorare di squadra, a impegnarsi in un progetto

gamification.defaultProgram.rule.addUserProfileAvatar.title=Aggiungi un avatar del profilo
gamification.defaultProgram.rule.addUserProfileAvatar.description=Imposta un avatar del profilo in modo che gli altri membri possano facilmente riconoscerti


gamification.defaultProgram.rule.addUserProfileBanner.title=Aggiungi un banner del profilo
gamification.defaultProgram.rule.addUserProfileBanner.description=Rendi il tuo profilo più attraente aggiungendo un banner personalizzato


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Presentarsi
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Compila la sezione "Su di me" sul tuo profilo.<br>È la prima cosa che altri vedranno quando visiteranno il tuo profilo.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Inserisci le informazioni di contatto
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Dal tuo profilo, inserisci le tue informazioni di contatto in modo che altri membri possano contattarti se necessario.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Condividi la tua esperienza di profilo
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Qualsiasi esperienza di lavoro, e qualsiasi altra esperienza, può essere utile per chiunque.<br>Quindi dite alla vostra comunità cosa avete fatto e quali sono le vostre abilità riconosciute

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Imposta le preferenze delle notifiche
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Accedi alle impostazioni delle notifiche dal tuo centro di notifica.<br>Una volta lì, ti consigliamo di rivedere le preferenze delle notifiche in modo da poterle impostare a tua disposizione.

gamification.defaultProgram.rule.joinSpace.title=Unisciti ad altre comunità
gamification.defaultProgram.rule.joinSpace.description=Scopri le altre comunità unendole e iniziate a contribuire lì

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar Spazio Personalizzato
gamification.defaultProgram.rule.updateSpaceAvatar.description=Accedi alle impostazioni dello spazio e cambia l'avatar del tuo spazio

