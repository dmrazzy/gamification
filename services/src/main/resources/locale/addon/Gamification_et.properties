gamification.defaultProgram.rule.addSpace.description=Looge ruum, mille eesmärk on käsitleda mõnda teemat või mis majutab teie enda kogukonda

gamification.defaultProgram.rule.pinActivityOnSpace.title=Kinnitage olulised sõnumid
gamification.defaultProgram.rule.pinActivityOnSpace.description=Kinnitage oma hostitud ruumi tegevused, mida arvate, et teie liikmed peavad teie kogukonnaruumi sirvimisel nägema

gamification.defaultProgram.rule.inviteUserToSpace.title=Kutsuge inimesi ruumiga liituma
gamification.defaultProgram.rule.inviteUserToSpace.description=Kosmosekorraldajana kutsuge inimesi oma kogukonnaga liituma, olenevalt teemast ja nende teadmistest. Nii saate muuta oma kogukonna kaasahaaravaks ja võimsaks

gamification.defaultProgram.rule.becomeSpaceManager.title=Hallake oma ruumi
gamification.defaultProgram.rule.becomeSpaceManager.description=Hakka ruumi võõrustajaks ja julgustage oma kogukonda teadmisi jagama, meeskonnatööd tegema ja projektis osalema

gamification.defaultProgram.rule.addUserProfileAvatar.title=Lisage profiili avatar
gamification.defaultProgram.rule.addUserProfileAvatar.description=Määrake profiili avatar, et teised liikmed saaksid teid hõlpsalt ära tunda


gamification.defaultProgram.rule.addUserProfileBanner.title=Lisage profiilibänner
gamification.defaultProgram.rule.addUserProfileBanner.description=Muutke oma profiil atraktiivsemaks, lisades kohandatud bänneri


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Tutvustage ennast
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Täitke oma profiili jaotis "Teave minu kohta".<br>See on esimene asi, mida teised teie profiili külastades näevad.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Sisestage oma kontaktandmed
gamification.defaultProgram.rule.addUserProfileContactInformation.description=From your profile, enter your contact information, so other members can contact you if needed.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Jagage oma profiilikogemust
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Igasugune töökogemus ja muu kogemus võib olla kasulik kõigile.<br>Nii et rääkige oma kogukonnale, mida olete teinud ja millised on teie tunnustatud oskused

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Määrake teavituseelistused
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Juurdepääs oma teavituste seadetele teavituskeskusest.<br>Kui olete seal, soovitame teil märguannete eelistused üle vaadata, et saaksite need endale sobival ajal seadistada.

gamification.defaultProgram.rule.joinSpace.title=Liituge teiste kogukondadega
gamification.defaultProgram.rule.joinSpace.description=Avastage teisi kogukondi, liitudes nendega ja hakake seal panustama

gamification.defaultProgram.rule.updateSpaceAvatar.title=Kohandatud kosmoseavatar
gamification.defaultProgram.rule.updateSpaceAvatar.description=Juurdepääs ruumi seadetele ja muuta oma ruumi avatari

