gamification.defaultProgram.rule.addSpace.title=Mulailah komunitas Anda sendiri
gamification.defaultProgram.rule.addSpace.description=Ciptakan ruang yang bertujuan untuk membahas topik tertentu, atau yang akan mengumpulkan komunitas Anda

gamification.defaultProgram.rule.pinActivityOnSpace.title=Sematkan pesan penting
gamification.defaultProgram.rule.pinActivityOnSpace.description=Di ruang yang Anda kelola, sematkan aktivitas yang menurut Anda perlu dilihat anggota saat menjelajahi ruang komunitas Anda

gamification.defaultProgram.rule.inviteUserToSpace.title=Undang orang untuk bergabung dengan suatu ruang
gamification.defaultProgram.rule.inviteUserToSpace.description=Sebagai admin ruang, undang orang untuk bergabung tergantung topik dan keahlian mereka.

gamification.defaultProgram.rule.becomeSpaceManager.title=Kelola ruang Anda sendiri
gamification.defaultProgram.rule.becomeSpaceManager.description=Jadilah admin ruang dan dorong komunitas Anda untuk berbagi pengetahuan, berkolaborasi, atau terlibat dalam proyek

gamification.defaultProgram.rule.addUserProfileAvatar.title=Tambahkan avatar profil
gamification.defaultProgram.rule.addUserProfileAvatar.description=Atur avatar profil agar anggota lain dapat dengan mudah mengenali Anda


gamification.defaultProgram.rule.addUserProfileBanner.title=Tambahkan spanduk profil
gamification.defaultProgram.rule.addUserProfileBanner.description=Jadikan profil Anda lebih menarik dengan menambahkan spanduk khusus


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Perkenalkan diri Anda
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Isi bagian "Tentang saya" di profil Anda.<br>Ini adalah hal pertama yang akan dilihat orang lain ketika mereka mengunjungi profil Anda.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Masukkan informasi kontak Anda
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Dari profil Anda, masukkan informasi kontak Anda, sehingga anggota lain dapat menghubungi Anda jika diperlukan.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Bagikan Pengalaman Profil Anda
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Pengalaman kerja apa pun, dan pengalaman lainnya, dapat berguna bagi siapa pun.<br>Jadi, beri tahu komunitas Anda apa yang telah Anda lakukan dan keterampilan apa yang Anda kenali

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Tetapkan preferensi notifikasi Anda
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Akses setelan notifikasi dari pusat notifikasi.<br>Sesampai di sana, kami menyarankan Anda meninjau preferensi notifikasi sehingga Anda dapat menyetelnya sesuai keinginan Anda.

gamification.defaultProgram.rule.joinSpace.title=Bergabunglah dengan komunitas lain
gamification.defaultProgram.rule.joinSpace.description=Temukan komunitas lain dengan bergabung dengan mereka dan mulai berkontribusi di sana

gamification.defaultProgram.rule.updateSpaceAvatar.title=Avatar Ruang Kustom
gamification.defaultProgram.rule.updateSpaceAvatar.description=Akses pengaturan ruang dan ubah avatar ruang Anda

