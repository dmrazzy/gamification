gamification.defaultProgram.rule.inviteUserToSpace.description=Som romvert, inviter folk til å bli med i samfunnet avhengig av emnet og deres ekspertise. Derfor vil du kunne gjøre fellesskapet engasjert og kraftfull

gamification.defaultProgram.rule.becomeSpaceManager.title=Administrer ditt eget sted
gamification.defaultProgram.rule.becomeSpaceManager.description=Bli en romvert og oppmuntre ditt samfunn til å dele kunnskap, til å samarbeide for å engasjere seg i et prosjekt

gamification.defaultProgram.rule.addUserProfileAvatar.title=Legg til en profilprofilbilde
gamification.defaultProgram.rule.addUserProfileAvatar.description=Angi en profilavatar slik at andre medlemmer enkelt kan gjenkjenne deg


gamification.defaultProgram.rule.addUserProfileBanner.title=Legg til et profilbanner
gamification.defaultProgram.rule.addUserProfileBanner.description=Gjør profilen din ytterligere ved å legge til et egendefinert banner


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Introduser deg selv
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Fyll "Om meg" seksjonen på profilen din.<br>Det er det første andre vil se når de besøker profilen din.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Angi din kontaktinformasjon
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Fra profilen din blir kontaktinformasjonen din lagt inn slik at andre medlemmer kan kontakte deg hvis det er nødvendig.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Del din profil opplevelse
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Enhver arbeidserfaring og annen erfaring kan være nyttig for alle.<br>Så fortell fellesskapet ditt hva du har gjort og hva dine gjenkjente ferdigheter

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Angi varslingsinnstillingene dine
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Få tilgang til varslingsinnstillingene dine fra varslingssenteret.<br>Når du er der, anbefaler vi at du går gjennom varslingsinnstillingene slik at du kan angi dem når det passer deg.

gamification.defaultProgram.rule.joinSpace.title=Bli med i andre samfunn
gamification.defaultProgram.rule.joinSpace.description=Oppdag andre samfunn ved å bli med i dem og begynn å bidra der

gamification.defaultProgram.rule.updateSpaceAvatar.title=Egendefinert fellesskaps profilbilde
gamification.defaultProgram.rule.updateSpaceAvatar.description=Få tilgang til fellesskapets innstillinger og endre avataren til ditt lokale

