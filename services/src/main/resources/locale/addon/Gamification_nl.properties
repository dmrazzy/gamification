gamification.defaultProgram.rule.sendRelationshipRequest.description=Vanaf de pagina 'Personen' vragen anderen om deel te nemen aan je netwerk.<br>Vandaar dat je ze gemakkelijk kunt vinden bij het zoeken in de personen map

gamification.defaultProgram.rule.receiveRelationshipRequest.title=Netwerk verbinding
gamification.defaultProgram.rule.receiveRelationshipRequest.description=Maak uzelf bekend om uw vaardigheden, uw expertise.<br>Krijg meer mensen om contact met u op te nemen

gamification.defaultProgram.rule.addSpace.title=Start je eigen gemeenschap
gamification.defaultProgram.rule.addSpace.description=Maak een ruimte die zich richt op het aanpakken van een onderwerp, of die uw eigen gemeenschap organiseert

gamification.defaultProgram.rule.pinActivityOnSpace.title=Belangrijke berichten vastzetten
gamification.defaultProgram.rule.pinActivityOnSpace.description=In een ruimte die u host, speld activiteiten waarvan u denkt dat uw leden moeten zien tijdens het browsen van uw gemeenschapsruimte

gamification.defaultProgram.rule.inviteUserToSpace.title=Nodig mensen uit voor een ruimte
gamification.defaultProgram.rule.inviteUserToSpace.description=Als ruimte-host nodigt u mensen uit om deel te nemen aan uw gemeenschap afhankelijk van de topic en hun expertise. Zo zal je in staat zijn om je gemeenschap actief en krachtig te maken

gamification.defaultProgram.rule.becomeSpaceManager.title=Uw eigen ruimte beheren
gamification.defaultProgram.rule.becomeSpaceManager.description=Word een ruimte-host en moedig je gemeenschap aan om kennis, teamwork en deel te nemen aan een project

gamification.defaultProgram.rule.addUserProfileAvatar.title=Voeg een profielavatar toe
gamification.defaultProgram.rule.addUserProfileAvatar.description=Stel een profielavatar in zodat andere leden je gemakkelijk kunnen herkennen


gamification.defaultProgram.rule.addUserProfileBanner.title=Een profielbanner toevoegen
gamification.defaultProgram.rule.addUserProfileBanner.description=Maak je profiel aantrekkelijker door een eigen banner toe te voegen


gamification.defaultProgram.rule.addUserProfileAboutMe.title=Stel jezelf voor
gamification.defaultProgram.rule.addUserProfileAboutMe.description=Vul de "Over mij" sectie op je profiel in.<br>Het is het eerste wat anderen zien wanneer ze je profiel bezoeken.

gamification.defaultProgram.rule.addUserProfileContactInformation.title=Voer uw contactgegevens in
gamification.defaultProgram.rule.addUserProfileContactInformation.description=Voer uw contactgegevens in zodat andere leden indien nodig contact met u kunnen opnemen.


gamification.defaultProgram.rule.addUserProfileWorkExperience.title=Deel uw profielervaring
gamification.defaultProgram.rule.addUserProfileWorkExperience.description=Elke werkervaring en elke andere ervaring kan voor iedereen nuttig zijn.<br>Dus vertel je gemeenschap wat je hebt gedaan en wat zijn je erkende vaardigheden

gamification.defaultProgram.rule.addUserProfileNotificationSetting.title=Stel je notificatievoorkeuren in
gamification.defaultProgram.rule.addUserProfileNotificationSetting.description=Toegang tot je notificatie instellingen vanuit je notificatie center.<br>Eenmaal dan, raden we u aan om de meldingsvoorkeuren te herzien zodat u ze op uw gemak kunt instellen.

gamification.defaultProgram.rule.joinSpace.title=Sluit je aan bij andere gemeenschappen
gamification.defaultProgram.rule.joinSpace.description=Ontdek andere gemeenschappen door ze aan te sluiten en daar bij te dragen

gamification.defaultProgram.rule.updateSpaceAvatar.title=Aangepaste Ruimte Avatar
gamification.defaultProgram.rule.updateSpaceAvatar.description=Toegang tot de ruimte-instellingen en wijzig de avatar van uw ruimte

